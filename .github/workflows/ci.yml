name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ai_chatbot/ai_chatbot.csproj

      - name: Build project
        run: dotnet build ai_chatbot/ai_chatbot.csproj --configuration Release --no-restore

      - name: Run tests (if test project exists)
        run: |
          if find . -name "*Tests.csproj" | grep -q .; then
            dotnet test --configuration Release --verbosity normal
          else
            echo "No test project found - skipping tests"
          fi
